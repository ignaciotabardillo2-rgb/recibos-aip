<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibos Amway México</title>

<style>

body{
font-family:Arial;
background:#0b1320;
margin:0;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111c2f;
padding:25px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

h1{
margin-top:0;
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

input, textarea{
width:100%;
padding:12px;
margin-top:5px;
border-radius:8px;
border:none;
background:#1b2a44;
color:white;
}

button{
margin-top:20px;
padding:15px;
border:none;
border-radius:10px;
background:#2d4c7c;
color:white;
font-weight:bold;
cursor:pointer;
width:100%;
}

.product{
background:#1b2a44;
padding:15px;
margin:10px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.receipt{
background:white;
color:black;
padding:40px;
border-radius:10px;
margin-top:30px;
display:none;
}

.signature{
margin-top:60px;
text-align:center;
}

.line{
border-top:1px solid black;
width:200px;
margin:auto;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Recibos Amway México</h1>

<p>
Ignacio Tabardillo<br>
Empresario Independiente Amway<br>
ID: 1701181882
</p>

<label>Número de recibo</label>
<input id="folio">

<label>Fecha</label>
<input type="date" id="fecha">

<label>Nombre del cliente</label>
<input id="cliente">

<label>Cantidad ($)</label>
<input id="cantidad" type="number">

<label>Cantidad con letra</label>
<input id="letra">

<label>Concepto</label>
<textarea id="concepto"></textarea>

<button onclick="generar()">Generar Recibo</button>

</div>

<div class="receipt" id="recibo">

<h2>RECIBO</h2>

<p>
<strong>Recibo No:</strong> <span id="rfolio"></span><br>
<strong>Fecha:</strong> <span id="rfecha"></span><br>
<strong>Cliente:</strong> <span id="rcliente"></span>
</p>

<p>
<strong>Cantidad:</strong> $<span id="rcantidad"></span>
</p>

<p>
<strong>Importe con letra:</strong><br>
<span id="rletra"></span>
</p>

<p>
<strong>Concepto:</strong><br>
<span id="rconcepto"></span>
</p>

<div class="signature">

<img src="firma.PNG" width="150">

<div class="line"></div>

Firma de recibido

</div>

</div>

</div>

<script>

function generar(){

document.getElementById("recibo").style.display="block"

document.getElementById("rfolio").innerText=document.getElementById("folio").value

document.getElementById("rfecha").innerText=document.getElementById("fecha").value

document.getElementById("rcliente").innerText=document.getElementById("cliente").value

document.getElementById("rcantidad").innerText=document.getElementById("cantidad").value

document.getElementById("rletra").innerText=document.getElementById("letra").value

document.getElementById("rconcepto").innerText=document.getElementById("concepto").value

}

</script>

</body>
</html>
