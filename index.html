<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recibos AIP</title>
  <style>
    :root{
      --bg:#0f1115;
      --card:#151923;
      --stroke:#242b3a;
      --muted:#aeb6c4;
      --text:#ffffff;
      --accent:#19a85b;
      --accent2:#0a6b3f;
      --danger:#d84a4a;
      --btn:#222838;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial;
      background: radial-gradient(1200px 600px at 20% 10%, rgba(25,168,91,.10), transparent 60%),
                  radial-gradient(900px 500px at 85% 20%, rgba(26,120,255,.10), transparent 55%),
                  var(--bg);
      color:var(--text);
      padding:18px;
    }
    .wrap{max-width:980px;margin:0 auto}
    .topbar{
      display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
      margin:6px 0 18px;
    }
    .brand h1{font-size:28px;letter-spacing:.2px;margin:0 0 6px}
    .brand p{margin:0;color:var(--muted);line-height:1.35}
    .pill{
      display:inline-flex;align-items:center;gap:10px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--stroke);
      padding:10px 12px;border-radius:999px;
      box-shadow:0 10px 25px rgba(0,0,0,.18);
      min-width:190px;justify-content:space-between;
    }
    .pill b{font-size:12px;color:var(--muted);font-weight:700}
    .pill span{font-size:18px;font-weight:900;letter-spacing:.5px}

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      padding:18px;
      box-shadow: var(--shadow);
    }
    .title{font-size:18px;font-weight:900;margin:0 0 12px}
    .grid{
      display:grid;
      grid-template-columns: 220px 1fr;
      gap:12px 14px;
      align-items:center;
    }
    label{color:var(--muted);font-size:13px}
    input, textarea, select{
      width:100%;
      background:rgba(0,0,0,.25);
      color:var(--text);
      border:1px solid var(--stroke);
      border-radius:14px;
      padding:14px 14px;
      outline:none;
      font-size:16px;
    }
    textarea{min-height:54px;resize:vertical}
    input:disabled{
      opacity:.7;
      background:rgba(255,255,255,.04);
    }
    .actions{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;
      margin-top:16px;
    }
    button{
      border:1px solid var(--stroke);
      background:var(--btn);
      color:var(--text);
      padding:12px 14px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      font-size:16px;
    }
    button.primary{
      background:linear-gradient(180deg, var(--accent), var(--accent2));
      border-color:rgba(0,0,0,.18);
    }
    button.mini{padding:12px 14px;background:rgba(255,255,255,.06)}
    .status{
      padding:10px 12px;border-radius:14px;
      border:1px dashed rgba(255,255,255,.18);
      color:var(--muted);
      font-size:14px;
    }
    .status.bad{border-color:rgba(216,74,74,.6);color:#ffb3b3}
    .status.good{border-color:rgba(25,168,91,.55);color:#b9ffd7}

    /* Modal */
    .modalBg{
      position:fixed;inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;justify-content:center;
      padding:18px;
      z-index:999;
    }
    .modal{
      width:min(920px, 96vw);
      max-height:86vh;
      overflow:auto;
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:20px;
      box-shadow: var(--shadow);
    }
    .modalHdr{
      position:sticky;top:0;
      background:linear-gradient(180deg, rgba(21,25,35,1), rgba(21,25,35,.88));
      border-bottom:1px solid var(--stroke);
      padding:12px 14px;
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      z-index:2;
    }
    .modalHdr b{font-size:14px}
    .modalBody{padding:14px}
    .modalBtns{display:flex;gap:10px;flex-wrap:wrap}

    /* Receipt preview inside modal */
    .rec{
      background:#fff;color:#111;border-radius:14px;
      padding:18px;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial;
    }
    .rec .row{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .rec h2{margin:0 0 6px;font-size:18px}
    .rec small{color:#444}
    .rec hr{border:none;border-top:1px solid #ddd;margin:12px 0}
    .rec .kv{display:grid;grid-template-columns: 180px 1fr;gap:8px;margin:8px 0}
    .rec .kv div:nth-child(odd){color:#333;font-weight:700}
    .rec .kv div:nth-child(even){color:#111}
    .rec .sign{display:flex;justify-content:space-between;gap:18px;margin-top:22px}
    .rec .line{flex:1;border-top:1px solid #999;padding-top:6px;text-align:center;color:#333;font-size:12px}

    @media (max-width:720px){
      .grid{grid-template-columns: 1fr;gap:10px}
      .pill{min-width:auto}
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <h1>Recibos AIP</h1>
      <p>Blanco formal • Folio automático • PDF estable en iPhone (Safari).<br>
      La fecha se genera sola. La cantidad en letra se genera sola (sin centavos).</p>
    </div>
    <div class="pill">
      <b>Próximo folio:</b>
      <span id="nextFolio">AIP-0001</span>
    </div>
  </div>

  <div class="card">
    <p class="title">Crear recibo</p>

    <div class="grid">
      <label>Recibí de</label>
      <input id="recibiDe" placeholder="Nombre del cliente" autocomplete="name" />

      <label>Ciudad</label>
      <input id="ciudad" placeholder="Ej. Navojoa" />

      <label>Dirección</label>
      <input id="direccion" placeholder="Calle, colonia (opcional)" />

      <label>Celular</label>
      <input id="celular" placeholder="10 dígitos" inputmode="numeric" />

      <label>Cantidad ($)</label>
      <input id="cantidad" placeholder="Ej. 1200" inputmode="numeric" />

      <label>Importe con letra (auto)</label>
      <input id="importeLetra" disabled placeholder="Se genera automáticamente" />

      <label>Por concepto de pago</label>
      <input id="conceptoPago" placeholder="Ej. Amway / Asesoría / Producto" />

      <label>Método de pago</label>
      <select id="metodoPago">
        <option value="Efectivo">Efectivo</option>
        <option value="Transferencia">Transferencia</option>
        <option value="Tarjeta">Tarjeta</option>
        <option value="Otro">Otro</option>
      </select>

      <label>Fecha (auto)</label>
      <input id="fecha" disabled />
    </div>

    <div class="actions">
      <button class="primary" onclick="crear()">Generar recibo (PDF)</button>
      <button class="mini" onclick="limpiar()">Limpiar</button>
      <button class="mini" onclick="abrirHistorial()">Ver historial</button>
      <span id="status" class="status">Listo.</span>
    </div>
  </div>
</div>

<!-- Modal Recibo -->
<div id="modalBg" class="modalBg" onclick="cerrarModalSiBg(event)">
  <div class="modal">
    <div class="modalHdr">
      <b>Vista previa del recibo</b>
      <div class="modalBtns">
        <button class="mini" onclick="imprimirActual()">Imprimir / Guardar PDF</button>
        <button class="mini" onclick="cerrarModal()">Cerrar</button>
      </div>
    </div>
    <div class="modalBody">
      <div id="modalPreview"></div>
    </div>
  </div>
</div>

<!-- Modal Historial -->
<div id="modalHistBg" class="modalBg" onclick="cerrarHistSiBg(event)">
  <div class="modal">
    <div class="modalHdr">
      <b>Historial</b>
      <div class="modalBtns">
        <button class="mini" onclick="borrarHistorial()">Borrar historial</button>
        <button class="mini" onclick="cerrarHistorial()">Cerrar</button>
      </div>
    </div>
    <div class="modalBody">
      <div id="historialList"></div>
    </div>
  </div>
</div>

<script>
/* ========= CONFIG ========= */
const SERIE = "AIP-";
const COUNTER_KEY = "aip_counter_v1";
const RECEIPTS_KEY = "aip_receipts_v1";

/* ========= HELPERS ========= */
function setStatus(msg, type="muted"){
  const el = document.getElementById("status");
  el.className = "status";
  if(type==="bad") el.classList.add("bad");
  if(type==="good") el.classList.add("good");
  el.textContent = msg;
}
function esc(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function v(id){ return document.getElementById(id).value.trim(); }
function pad4(n){ return String(n).padStart(4,"0"); }
function nowISO(){ return new Date().toISOString(); }
function fechaTexto(d){
  const opt = { day:"2-digit", month:"2-digit", year:"numeric" };
  return new Intl.DateTimeFormat("es-MX", opt).format(d);
}
function getCounter(){
  const raw = Number(localStorage.getItem(COUNTER_KEY));
  return Number.isFinite(raw) ? raw : 1;
}
function setCounter(n){
  localStorage.setItem(COUNTER_KEY, String(n));
  updateNextFolio();
}
function updateNextFolio(){
  const folio = SERIE + pad4(getCounter());
  document.getElementById("nextFolio").textContent = folio;
}
function loadReceipts(){
  try{ return JSON.parse(localStorage.getItem(RECEIPTS_KEY) || "[]"); }
  catch(e){ return []; }
}
function saveReceipts(arr){
  localStorage.setItem(RECEIPTS_KEY, JSON.stringify(arr));
}
function parseMonto(raw){
  // acepta: "1,200" "1200" "$1 200" "1 200.50" etc -> SIN centavos
  const s = (raw ?? "").toString()
    .replaceAll("$","")
    .replaceAll(",","")
    .replaceAll(" ","")
    .replaceAll("\t","")
    .trim();

  if(!s) return NaN;
  const n = Number(s);
  if(!Number.isFinite(n)) return NaN;
  return Math.floor(n);
}

/* ========= NÚMERO A LETRAS (sin centavos) ========= */
function numeroALetras(n){
  n = Math.floor(n);
  if(!Number.isFinite(n) || n < 0) return "";
  if(n === 0) return "Cero pesos";

  const unidades = ["","uno","dos","tres","cuatro","cinco","seis","siete","ocho","nueve"];
  const especiales = {
    10:"diez", 11:"once", 12:"doce", 13:"trece", 14:"catorce", 15:"quince",
    16:"dieciséis", 17:"diecisiete", 18:"dieciocho", 19:"diecinueve"
  };
  const decenas = ["","diez","veinte","treinta","cuarenta","cincuenta","sesenta","setenta","ochenta","noventa"];
  const centenas = ["","ciento","doscientos","trescientos","cuatrocientos","quinientos","seiscientos","setecientos","ochocientos","novecientos"];

  function menosDe100(x){
    if(x < 10) return unidades[x];
    if(x < 20) return especiales[x];
    if(x < 30){
      if(x === 20) return "veinte";
      return "veinti" + unidades[x-20];
    }
    const d = Math.floor(x/10);
    const r = x % 10;
    if(r === 0) return decenas[d];
    return decenas[d] + " y " + unidades[r];
  }

  function menosDe1000(x){
    if(x === 100) return "cien";
    const c = Math.floor(x/100);
    const r = x % 100;
    let out = "";
    if(c > 0) out += centenas[c];
    if(r > 0) out += (out ? " " : "") + menosDe100(r);
    return out;
  }

  function seccion(x, divisor, singular, plural){
    const q = Math.floor(x / divisor);
    const r = x % divisor;
    let out = "";
    if(q > 0){
      if(q === 1) out = singular;
      else out = menosDe1000(q) + " " + plural;
    }
    return { out, resto: r };
  }

  let x = n;
  let texto = "";

  // millones
  const milMill = seccion(x, 1000000, "un millón", "millones");
  if(milMill.out){
    texto += milMill.out;
    x = milMill.resto;
  }

  // miles
  const miles = seccion(x, 1000, "mil", "mil");
  if(miles.out){
    texto += (texto ? " " : "") + (miles.out === "mil" ? "mil" : miles.out);
    x = miles.resto;
  }

  // resto
  if(x > 0){
    texto += (texto ? " " : "") + menosDe1000(x);
  }

  // Ajustes: "uno" -> "un" antes de "pesos"
  texto = texto.trim();
  if(texto.endsWith("uno")) texto = texto.slice(0, -3) + "un";

  // Capitalizar primera
  texto = texto.charAt(0).toUpperCase() + texto.slice(1);

  return texto + " pesos";
}

/* ========= AUTO LETRA + FECHA ========= */
function autoLetra(){
  const n = parseMonto(document.getElementById("cantidad").value);
  const letra = Number.isFinite(n) && n > 0 ? numeroALetras(n) : "";
  document.getElementById("importeLetra").value = letra;
}

function autoFecha(){
  document.getElementById("fecha").value = fechaTexto(new Date());
}

/* ========= VALIDACIÓN ========= */
function validar(){
  const required = ["recibiDe","ciudad","direccion","celular","cantidad","conceptoPago"];
  for(const k of required){
    if(!v(k)) return "Falta completar: " + nombreCampo(k);
  }

  const cel = v("celular").replaceAll(" ","");
  if(!/^\d{8,15}$/.test(cel)) return "Celular inválido (usa solo números).";

  const n = parseMonto(v("cantidad"));
  if(!Number.isFinite(n) || n <= 0) return "Cantidad inválida.";

  return "";
}

function nombreCampo(k){
  const map = {
    recibiDe:"Recibí de",
    ciudad:"Ciudad",
    direccion:"Dirección",
    celular:"Celular",
    cantidad:"Cantidad",
    conceptoPago:"Concepto de pago"
  };
  return map[k] || k;
}

/* ========= CREAR RECIBO ========= */
let ultimoItem = null;

function crear(){
  try{
    autoLetra(); // fuerza calcular antes
    autoFecha();

    const err = validar();
    if(err){ setStatus(err,"bad"); return; }

    const d = new Date();
    const folio = SERIE + pad4(getCounter());
    const monto = parseMonto(v("cantidad"));
    const letra = numeroALetras(monto);

    const item = {
      id: (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now()) + "_" + Math.random().toString(16).slice(2)),
      folio,
      fechaISO: d.toISOString(),
      fechaTexto: fechaTexto(d),
      recibiDe: v("recibiDe"),
      ciudad: v("ciudad"),
      direccion: v("direccion"),
      celular: v("celular"),
      cantidad: String(monto),
      importeLetra: letra,
      conceptoPago: v("conceptoPago"),
      metodoPago: document.getElementById("metodoPago").value,
      creadoEnISO: nowISO()
    };

    // Guardar
    const arr = loadReceipts();
    arr.unshift(item);
    saveReceipts(arr);

    // Incrementar folio
    setCounter(getCounter() + 1);

    // Vista previa
    ultimoItem = item;
    mostrarPreview(item);

    setStatus("Recibo listo. Se abrirá impresión para guardar PDF.","good");

    // Abrir modal
    abrirModal();

    // En iPhone, para PDF: imprimir -> compartir -> guardar en Archivos
    // Disparamos impresión con un pequeño delay para que se renderice bien
    setTimeout(()=> imprimirActual(), 400);

  }catch(e){
    console.error(e);
    setStatus("Error interno: revisa consola / vuelve a intentar.","bad");
  }
}

/* ========= RENDER RECIBO ========= */
function reciboHTML(item){
  return `
  <div class="rec">
    <div class="row">
      <div>
      <div style="text-align:center;margin-bottom:15px">

<img src="logo.PNG" style="height:70px;margin-bottom:10px">

<h2 style="margin:0;font-size:22px;letter-spacing:1px">
RECIBOS TABARDILLO
</h2>

<div style="font-size:13px;color:#444">
Asesoría Integral en Pensiones
</div>

</div>
    
      </div>
      <div style="text-align:right">
        <div><b>Folio:</b> ${esc(item.folio)}</div>
        <div><b>Fecha:</b> ${esc(item.fechaTexto)}</div>
      </div>
    </div>
    <hr/>
    <div class="kv">
      <div>Recibí de:</div><div>${esc(item.recibiDe)}</div>
      <div>Ciudad:</div><div>${esc(item.ciudad)}</div>
      <div>Dirección:</div><div>${esc(item.direccion)}</div>
      <div>Celular:</div><div>${esc(item.celular)}</div>
      <div>Método de pago:</div><div>${esc(item.metodoPago)}</div>
      <div>Concepto de pago:</div><div>${esc(item.conceptoPago)}</div>
      <div>Cantidad:</div><div><b>$${esc(item.cantidad)}</b></div>
      <div>Importe con letra:</div><div>${esc(item.importeLetra)}</div>
    </div>

    <div class="sign">
      <div class="line">Entrega / Cliente</div>
      <div class="line">Recibe / AIP</div>
    </div>

    <div style="margin-top:10px;font-size:11px;color:#444">
      Este documento es un comprobante interno. Folio generado automáticamente.
    </div>
  </div>`;
}

function mostrarPreview(item){
  document.getElementById("modalPreview").innerHTML = reciboHTML(item);
}

function abrirModal(){
  document.getElementById("modalBg").style.display = "flex";
}
function cerrarModal(){
  document.getElementById("modalBg").style.display = "none";
}
function cerrarModalSiBg(ev){
  if(ev.target && ev.target.id === "modalBg") cerrarModal();
}

/* ========= IMPRIMIR / GUARDAR PDF ========= */
function imprimirActual(){
  if(!ultimoItem){
    setStatus("No hay recibo para imprimir.","bad");
    return;
  }

  const html = `
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>${esc(ultimoItem.folio)}</title>
  <style>
    body{margin:0;padding:18px;background:#f2f2f2;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial;}
    .sheet{max-width:900px;margin:0 auto;}
    .rec{background:#fff;color:#111;border-radius:14px;padding:18px;border:1px solid #ddd;}
    .row{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
    h2{margin:0 0 6px;font-size:18px}
    small{color:#444}
    hr{border:none;border-top:1px solid #ddd;margin:12px 0}
    .kv{display:grid;grid-template-columns: 180px 1fr;gap:8px;margin:8px 0}
    .kv div:nth-child(odd){color:#333;font-weight:700}
    .kv div:nth-child(even){color:#111}
    .sign{display:flex;justify-content:space-between;gap:18px;margin-top:22px}
    .line{flex:1;border-top:1px solid #999;padding-top:6px;text-align:center;color:#333;font-size:12px}
    @media print{
      body{background:#fff;padding:0}
      .rec{border:none}
    }
  </style>
</head>
<body>
  <div class="sheet">
    ${reciboHTML(ultimoItem)}
  </div>
  <script>
    setTimeout(()=>{ window.print(); }, 350);
  <\/script>
</body>
</html>`;

  const w = window.open("", "_blank");
  if(!w){
    setStatus("Safari bloqueó la ventana. Intenta de nuevo o permite popups.","bad");
    return;
  }
  w.document.open();
  w.document.write(html);
  w.document.close();
}

/* ========= LIMPIAR ========= */
function limpiar(){
  const ids = ["recibiDe","ciudad","direccion","celular","cantidad","conceptoPago"];
  for(const id of ids) document.getElementById(id).value = "";
  document.getElementById("metodoPago").value = "Efectivo";
  document.getElementById("importeLetra").value = "";
  autoFecha();
  setStatus("Listo.","muted");
}

/* ========= HISTORIAL ========= */
function abrirHistorial(){
  const arr = loadReceipts();
  const box = document.getElementById("historialList");
  if(arr.length === 0){
    box.innerHTML = `<div class="status">No hay recibos guardados todavía.</div>`;
  }else{
    box.innerHTML = arr.map(r => `
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap">
          <div><b>${esc(r.folio)}</b> • <span style="color:var(--muted)">${esc(r.fechaTexto)}</span></div>
          <div><b>$${esc(r.cantidad)}</b></div>
        </div>
        <div style="color:var(--muted);margin-top:4px">${esc(r.recibiDe)} • ${esc(r.conceptoPago)} • ${esc(r.metodoPago)}</div>
        <div style="margin-top:8px;display:flex;gap:10px;flex-wrap:wrap">
          <button class="mini" onclick='verRecibo("${esc(r.id)}")'>Ver</button>
          <button class="mini" onclick='imprimirRecibo("${esc(r.id)}")'>Imprimir / PDF</button>
        </div>
        <hr style="border:none;border-top:1px solid var(--stroke);margin:12px 0 0">
      </div>
    `).join("");
  }
  document.getElementById("modalHistBg").style.display = "flex";
}
function cerrarHistorial(){
  document.getElementById("modalHistBg").style.display = "none";
}
function cerrarHistSiBg(ev){
  if(ev.target && ev.target.id === "modalHistBg") cerrarHistorial();
}
function verRecibo(id){
  const arr = loadReceipts();
  const r = arr.find(x => x.id === id);
  if(!r){ setStatus("No se encontró ese recibo.","bad"); return; }
  ultimoItem = r;
  mostrarPreview(r);
  cerrarHistorial();
  abrirModal();
}
function imprimirRecibo(id){
  const arr = loadReceipts();
  const r = arr.find(x => x.id === id);
  if(!r){ setStatus("No se encontró ese recibo.","bad"); return; }
  ultimoItem = r;
  imprimirActual();
}
function borrarHistorial(){
  if(confirm("¿Seguro que quieres borrar TODO el historial?")){
    localStorage.removeItem(RECEIPTS_KEY);
    setStatus("Historial borrado.","good");
    abrirHistorial();
  }
}

/* ========= INIT ========= */
document.addEventListener("DOMContentLoaded", () => {
  updateNextFolio();
  autoFecha();

  // Auto letra cuando escribes cantidad
  document.getElementById("cantidad").addEventListener("input", autoLetra);

  // También recalcula si pegas
  document.getElementById("cantidad").addEventListener("change", autoLetra);

  setStatus("Listo.","muted");
});
</script>
