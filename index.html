<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recibos AIP</title>
  <style>
    :root{
      --bg:#0f1115; --card:#151923; --stroke:#242b3a; --muted:#b6b6b6; --text:#eaeaea;
      --accent:#0a6b3f; --danger:#d84a4a; --btn:#22293a;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:980px;margin:0 auto;padding:18px}
    .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:14px}
    .brand .h1{font-size:20px;font-weight:900;margin:0}
    .brand .h2{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.35}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid var(--stroke);border-radius:999px;background:#0f1115}
    .pill b{font-size:12px}
    .pill span{font-size:12px;color:var(--muted)}
    .card{background:var(--card);border:1px solid var(--stroke);border-radius:16px;padding:16px;margin:12px 0}
    .title{font-size:14px;font-weight:800;margin:0 0 12px 0}
    .grid{display:grid;grid-template-columns:170px 1fr;gap:10px 12px}
    label{font-size:12px;color:#cfcfcf;padding-top:8px}
    input, textarea, select{
      width:100%; background:#0f1115;border:1px solid #2b3244;color:#fff;
      padding:10px 12px;border-radius:12px;outline:none; font-size:14px;
    }
    textarea{min-height:74px;resize:vertical}
    input:focus, textarea:focus, select:focus{border-color:#3e8a5b}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;align-items:center}
    button{
      background:var(--btn); border:1px solid #2b3244; color:#fff;
      padding:10px 12px; border-radius:12px; cursor:pointer; font-weight:800;
    }
    button:hover{border-color:#3e8a5b}
    .primary{background:var(--accent);border-color:var(--accent)}
    .mini{padding:8px 10px;border-radius:10px;font-size:12px;font-weight:800}
    .muted{color:var(--muted);font-size:12px}
    .status{font-size:12px;padding:8px 10px;border-radius:12px;border:1px solid #2b3244;background:#0f1115}
    .status.ok{border-color:#2b8f5a;color:#8dffb4}
    .status.bad{border-color:#b85b5b;color:#ffb3b3}

    /* Modal */
    .modalBg{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;padding:18px;z-index:999}
    .modal{max-width:860px;width:100%;background:#0f1115;border:1px solid #2b3244;border-radius:16px;overflow:hidden}
    .modalHdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid #2b3244}
    .modalHdr b{font-size:13px}
    .modalBody{padding:14px}
    .modalBtns{display:flex;gap:10px;flex-wrap:wrap;padding:12px 14px;border-top:1px solid #2b3244;justify-content:flex-end}

    /* Lista historial */
    .histList{display:flex;flex-direction:column;gap:10px}
    .item{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px;border:1px solid var(--stroke);border-radius:14px;background:#0f1115}
    .item .left{min-width:0}
    .item .folio{font-weight:900}
    .item .meta{font-size:12px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:640px}
    .link{color:#8dffb4;text-decoration:none;font-size:12px;font-weight:900}

    /* Área imprimible */
    @media print{
      body{background:#fff;color:#000}
      .wrap, .modalBg{display:none !important}
      #printArea{display:block !important}
    }
    #printArea{display:none;padding:24px;font-family:Arial,sans-serif;color:#111}
    #printArea .pTop{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}
    #printArea .pBrand{display:flex;gap:14px;align-items:flex-start}
    #printArea .logo{width:56px;height:56px;border-radius:12px;object-fit:contain;border:1px solid #e6e6e6;padding:6px}
    #printArea .pBrand h1{margin:0;font-size:15px;letter-spacing:.6px;color:#0a6b3f}
    #printArea .pBrand .sub{margin-top:4px;font-size:11px;color:#333}
    #printArea .pFolio{text-align:right}
    #printArea .pFolio .tag{font-size:11px;color:#333}
    #printArea .pFolio .num{font-size:15px;font-weight:800;margin-top:2px}
    #printArea .box{margin-top:16px;border:1px solid #e6e6e6;border-radius:12px;padding:16px}
    #printArea table{width:100%;border-collapse:collapse;margin-top:8px}
    #printArea td{padding:10px 8px;vertical-align:top}
    #printArea .lbl{width:170px;color:#444;font-size:11px}
    #printArea .val{border-bottom:1px solid #d9d9d9;font-size:12px;padding-bottom:6px}
    #printArea .foot{margin-top:22px;display:flex;gap:18px;justify-content:space-between}
    #printArea .sig{flex:1}
    #printArea .line{border-bottom:1px solid #111;height:22px}
    #printArea .small{font-size:10px;color:#555;margin-top:6px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <p class="h1">Recibos AIP</p>
        <p class="h2">
          Blanco formal • Folio automático • PDF estable en iPhone (Safari).<br/>
          La fecha se genera sola. La cantidad en letra se genera sola (sin centavos).
        </p>
      </div>
      <div class="pill"><b>Próximo folio:</b> <span id="nextFolio">AIP-0001</span></div>
    </div>

    <div class="card">
      <p class="title">Crear recibo</p>
      <div class="grid">
        <label>Recibí de</label><input id="recibiDe" placeholder="Nombre del cliente" />
<input id="cantidad" inputmode="numeric" oninput="autoLetra()" placeholder="0">
        <label>Ciudad</label><input id="ciudad" placeholder="Ej. Navojoa, Sonora" />

        <label>Dirección</label><input id="direccion" placeholder="Dirección" />

        <label>Celular</label><input id="celular" placeholder="Ej. 6421 000 000" />

        

        <label>Cantidad ($)</label>
      <input id="cantidad" inputmode="numeric" oninput="autoLetra()" placeholder="0">

        <label>Importe con letra (auto)</label>
        <input id="cantidad" inputmode="numeric" placeholder="Ej. 1200">

        <label>Por concepto de pago</label><input id="conceptoPago" placeholder="Ej. Pago de asesoría" />

        <label>Método de pago</label>
        <select id="metodoPago">
          <option value="Efectivo">Efectivo</option>
          <option value="Transferencia">Transferencia</option>
          <option value="Tarjeta">Tarjeta</option>
          <option value="Otro">Otro</option>
        </select>

        <label>Fecha (auto)</label><input id="fecha" disabled />
      </div>

      <div class="actions">
        <button class="primary" onclick="crear()">Generar recibo (PDF)</button>
        <button class="mini" onclick="limpiar()">Limpiar</button>
        <button class="mini" onclick="abrirHistorial()">Ver historial</button>
        <span id="status" class="status muted">Listo.</span>
      </div>
    </div>
  </div>

  <!-- Modal Recibo -->
  <div id="modalBg" class="modalBg" onclick="if(event.target.id==='modalBg') cerrarModal()">
    <div class="modal">
      <div class="modalHdr">
        <b>Vista previa del recibo</b>
        <button class="mini" onclick="cerrarModal()">Cerrar</button>
      </div>
      <div class="modalBody">
        <div id="modalPreview" class="muted">—</div>
      </div>
      <div class="modalBtns">
        <button class="mini primary" onclick="imprimirActual()">Imprimir / Guardar PDF</button>
      </div>
    </div>
  </div>

  <!-- Modal Historial -->
  <div id="histBg" class="modalBg" onclick="if(event.target.id==='histBg') cerrarHistorial()">
    <div class="modal">
      <div class="modalHdr">
        <b>Historial</b>
        <button class="mini" onclick="cerrarHistorial()">Cerrar</button>
      </div>
      <div class="modalBody">
        <div id="histList" class="histList"></div>
        <div class="muted" style="margin-top:10px;">Se guarda en este dispositivo (Safari).</div>
      </div>
      <div class="modalBtns">
        <button class="mini" style="border-color:#d84a4a;color:#ffb3b3;background:transparent" onclick="borrarHistorial()">Borrar historial</button>
      </div>
    </div>
  </div>

  <div id="printArea"></div>

  // ====== Helpers ======
  function pad4(n){return String(n).padStart(4,"0")}
  function nowISO(){return new Date().toISOString()}
  function fechaTexto(d){return d.toLocaleDateString("es-MX",{year:"numeric",month:"long",day:"numeric"})}
  function setStatus(msg,type="muted"){
    const el=document.getElementById("status");
    el.className="status "+type;
    el.textContent=msg||"";
  }
  function esc(s){
    return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }
  function v(id){return document.getElementById(id).value.trim()}
  function getCounter(){
    const v=Number(localStorage.getItem(COUNTER_KEY)||"1");
    return isNaN(v)?1:v;
  }
  function setCounter(n){
    localStorage.setItem(COUNTER_KEY,String(n));
    updateNextFolio();
  }
  function updateNextFolio(){
    document.getElementById("nextFolio").textContent=SERIE+pad4(getCounter());
  }
  function loadReceipts(){
    try{return JSON.parse(localStorage.getItem(STORE_KEY)||"[]")}catch(e){return []}
  }
  function saveReceipts(arr){localStorage.setItem(STORE_KEY,JSON.stringify(arr))}

  function parseMonto(raw){
  const s = String(raw ?? "").trim();
  const cleaned = s.replace(/[^0-9]/g, ""); // solo números
  if(!cleaned) return NaN;
  const n = Number(cleaned);
  if(!Number.isFinite(n)) return NaN;
  return Math.trunc(n);
}
    // Acepta "1,200", "1200", "1 200", "$1200"
    const s = (raw||"").toString().replaceAll("$","").replaceAll("MXN","").replaceAll(" ","").replaceAll(",","").trim();
    if(!s) return NaN;
    // sin centavos: toma entero
    const n = Number(s);
    if(!isFinite(n)) return NaN;
    return Math.floor(n);
  }

      25:"veinticinco",26:"veintiséis",27:"veintisiete",28:"veintiocho",29:"veintinueve"
    };
    const decenas = ["","diez","veinte","treinta","cuarenta","cincuenta","sesenta","setenta","ochenta","noventa"];
    const centenas = ["","ciento","doscientos","trescientos","cuatrocientos","quinientos","seiscientos","setecientos","ochocientos","novecientos"];

    function menosDeCien(x){
      if(x<10) return unidades[x];
      if(x in especiales) return especiales[x];
      const d = Math.floor(x/10);
      const u = x%10;
      if(d===2) return "veinti" + unidades[u]; // fallback (21-29 ya está, pero por si)
      return decenas[d] + (u?(" y "+unidades[u]):"");
    }

    function menosDeMil(x){
      if(x===0) return "";
      if(x===100) return "cien";
      const c = Math.floor(x/100);
      const r = x%100;
      return (centenas[c] + (r?(" " + menosDeCien(r)):"")).trim();
    }

    function seccion(x, divisor, singular, plural){
      const cientos = Math.floor(x/divisor);
      const resto = x - cientos*divisor;
      let texto = "";
      if(cientos===0) texto = "";
      else if(cientos===1) texto = singular;
      else texto = (divisor===1000 ? (menosDeMil(cientos) + " " + plural) : (menosDeMil(cientos) + " " + plural));
      return {texto:texto.trim(), resto};
    }

    let texto = "";
    let x = n;

    // Millones
    if(x>=1000000){
      const m = Math.floor(x/1000000);
      const resto = x%1000000;
      if(m===1) texto += "un millón";
      else texto += (menosDeMil(m) + " millones");
      x = resto;
      if(x) texto += " ";
    }
    // Miles
    if(x>=1000){
      const k = Math.floor(x/1000);
      const resto = x%1000;
      if(k===1) texto += "mil";
      else texto += (menosDeMil(k) + " mil");
      x = resto;
      if(x) texto += " ";
    }
    // Resto
    if(x>0){
      texto += menosDeMil(x);
    }

    // Ajustes: "uno" -> "un" antes de "pesos" (solo al final)
    texto = texto.trim();
    if(texto.endsWith("uno")) texto = texto.slice(0,-3) + "un";
    // Capitalizar primera
    texto = texto.charAt(0).toUpperCase() + texto.slice(1);
    return texto + " pesos";
  }

  function autoLetra(){
    const n = parseMonto(document.getElementById("cantidad").value);
    document.getElementById("importeLetra").value = isFinite(n) && n>0 ? numeroALetras(n) : "";
  }

  // ====== UI ======
  function validar(){
    const required = ["recibiDe","ciudad","direccion","celular","cantidad","conceptoPago"];
    for(const k of required){
      if(!v(k)) return "Falta completar: " + nombreCampo(k);
    }
    const n = parseMonto(v("cantidad"));
    if(!isFinite(n) || n<=0) return "Cantidad inválida. Usa solo números (ej. 1200).";
    return "";
  }
  function nombreCampo(k){
    const map = {
      recibiDe:"cliente",
      ciudad:"ciudad",
      direccion:"dirección",
      celular:"celular",
      
      cantidad:"monto",
      conceptoPago:"concepto de pago"
    };
    return map[k] || k;
  }

  function limpiar(){
    ["recibiDe","ciudad","direccion","celular",cantidad","conceptoPago"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("metodoPago").value="Efectivo";
    document.getElementById("importeLetra").value="";
    setStatus("Listo.","muted");
  }

  function crear(){
    try{
      const err = validar();
      if(err){ setStatus(err,"bad"); return; }

      const d = new Date();
      const folio = SERIE + pad4(getCounter());
      const monto = parseMonto(v("cantidad"));
      const letra = numeroALetras(monto);

      const item = {
        id: (crypto.randomUUID?crypto.randomUUID():(Date.now()+"-"+Math.random().toString(16).slice(2))),
        folio,
        fechaISO: d.toISOString(),
        fechaTexto: fechaTexto(d),
        recibiDe: v("recibiDe"),
        ciudad: v("ciudad"),
        direccion: v("direccion"),
        celular: v("celular"),
        
        cantidad: String(monto),
        importeLetra: letra,
        conceptoPago: v("conceptoPago"),
        metodoPago: document.getElementById("metodoPago").value,
        creadoEnISO: nowISO()
      };

      const arr = loadReceipts();
      arr.push(item);
      // limitar historial
      if(arr.length > MAX_HIST) arr.splice(0, arr.length - MAX_HIST);
      saveReceipts(arr);

      setCounter(getCounter()+1);
      setStatus("Recibo guardado: "+folio,"ok");

      // Mostrar vista previa (más compatible con iPhone)
      abrirModal(item);
    }catch(e){
      setStatus("Error: " + (e.message||e), "bad");
    }
  }

  function previewHTML(item){
    return `
      <div style="border:1px solid #2b3244;border-radius:12px;padding:12px;">
        <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;">
          <div style="display:flex;gap:12px;align-items:flex-start;">
            <img src="${LOGO_DATA_URI}" alt="Logo" style="width:44px;height:44px;border-radius:10px;object-fit:contain;border:1px solid #2b3244;padding:6px;background:#0f1115" />
            <div>
              <div style="font-weight:900;color:#8dffb4;">ASESORÍA INTEGRAL EN PENSIONES</div>
              <div class="muted">Recibo digital</div>
            </div>
          </div>
          <div style="text-align:right;">
            <div class="muted">Folio</div>
            <div style="font-weight:900;">${esc(item.folio)}</div>
            <div class="muted" style="margin-top:6px;">Fecha</div>
            <div style="font-weight:700;">${esc(item.fechaTexto)}</div>
          </div>
        </div>

        <div style="margin-top:12px;display:grid;grid-template-columns:140px 1fr;gap:8px 10px;font-size:13px;">
          <div class="muted">Recibí de</div><div>${esc(item.recibiDe)}</div>
          <div class="muted">Ciudad</div><div>${esc(item.ciudad)}</div>
          <div class="muted">Dirección</div><div>${esc(item.direccion)}</div>
          <div class="muted">Celular</div><div>${esc(item.celular)}</div>
        
          <div class="muted">Cantidad ($)</div><div>${esc(item.cantidad)}</div>
          <div class="muted">Importe con letra</div><div>${esc(item.importeLetra)}</div>
          <div class="muted">Concepto de pago</div><div>${esc(item.conceptoPago)}</div>
          <div class="muted">Método</div><div>${esc(item.metodoPago)}</div>
        </div>
      </div>
      <div class="muted" style="margin-top:10px;">
        Para guardar PDF: toca <b>Imprimir / Guardar PDF</b> y elige <b>Guardar en Archivos</b>.
      </div>
    `;
  }

  function abrirModal(item){
    currentToPrint = item;
    document.getElementById("modalPreview").innerHTML = previewHTML(item);
    document.getElementById("modalBg").style.display = "flex";
  }
  function cerrarModal(){
    document.getElementById("modalBg").style.display = "none";
    currentToPrint = null;
  }

  function buildPrint(item){
    const html = `
      <div class="pTop">
        <div class="pBrand">
          <img class="logo" src="${LOGO_DATA_URI}" alt="Logo" />
          <div>
            <h1>ASESORÍA INTEGRAL EN PENSIONES</h1>
            <div class="sub">Recibo de pago • Blanco formal</div>
          </div>
        </div>
        <div class="pFolio">
          <div class="tag">Folio</div>
          <div class="num">${esc(item.folio)}</div>
          <div class="tag" style="margin-top:10px;">Fecha</div>
          <div class="num" style="font-size:12px;font-weight:700;">${esc(item.fechaTexto)}</div>
        </div>
      </div>

      <div class="box">
        <div style="font-weight:800;margin-bottom:8px;">Datos del recibo</div>
        <table>
          <tr><td class="lbl">Recibí de</td><td class="val">${esc(item.recibiDe)}</td></tr>
          <tr><td class="lbl">Ciudad</td><td class="val">${esc(item.ciudad)}</td></tr>
          <tr><td class="lbl">Dirección</td><td class="val">${esc(item.direccion)}</td></tr>
          <tr><td class="lbl">Celular</td><td class="val">${esc(item.celular)}</td></tr>
    
          <tr><td class="lbl">Cantidad ($)</td><td class="val">${esc(item.cantidad)}</td></tr>
          <tr><td class="lbl">Importe con letra</td><td class="val">${esc(item.importeLetra)}</td></tr>
          <tr><td class="lbl">Concepto de pago</td><td class="val">${esc(item.conceptoPago)}</td></tr>
          <tr><td class="lbl">Método de pago</td><td class="val">${esc(item.metodoPago)}</td></tr>
        </table>
      </div>

      <div class="foot">
        <div class="sig"><div class="line"></div><div class="small">Firma de recibido</div></div>
        <div class="sig"><div class="line"></div><div class="small">Ignacio Tabardillo • Asesor</div></div>
      </div>

      <div class="small" style="margin-top:18px;">Documento generado digitalmente para control interno.</div>
    `;
    document.getElementById("printArea").innerHTML = html;
  }

  function imprimirActual(){
    if(!currentToPrint){ setStatus("No hay recibo para imprimir.","bad"); return; }
    buildPrint(currentToPrint);
    // Impresión por acción explícita (iPhone-friendly)
    setTimeout(()=>window.print(), 120);
  }

  // ====== Historial (simple) ======
  function abrirHistorial(){
    renderHistorial();
    document.getElementById("histBg").style.display="flex";
  }
  function cerrarHistorial(){
    document.getElementById("histBg").style.display="none";
  }
  function renderHistorial(){
    const arr = loadReceipts().slice().reverse();
    const el = document.getElementById("histList");
    if(!arr.length){
      el.innerHTML = `<div class="muted">Aún no hay recibos.</div>`;
      return;
    }
    el.innerHTML = arr.map(x=>`
      <div class="item">
        <div class="left">
          <div class="folio">${esc(x.folio)}</div>
          <div class="meta">${esc(x.fechaTexto)} • ${esc(x.recibiDe)} • $${esc(String(x.cantidad))}</div>
        </div>
        <a class="link" href="#" onclick="abrirModalPorId('${x.id}');return false;">Abrir / PDF</a>
      </div>
    `).join("");
  }
  function abrirModalPorId(id){
    const item = loadReceipts().find(r=>r.id===id);
    if(!item) return;
    cerrarHistorial();
    abrirModal(item);
  }
  function borrarHistorial(){
    if(!confirm("¿Borrar historial en este dispositivo?")) return;
    localStorage.removeItem(STORE_KEY);
    // No borramos contador para mantener folios consecutivos (opción B)
    setStatus("Historial borrado.","ok");
    renderHistorial();
  }

  // ====== Init ======
  function tickFecha(){
    document.getElementById("fecha").value = new Date().toLocaleString("es-MX");
  }
  tickFecha();
  setInterval(tickFecha, 1000);
  updateNextFolio();
  
  document.getElementById("cantidad").addEventListener("input", autoLetra);
autoLetra();
</script>
