<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibos Amway México</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
margin:0;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:40px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.header{
text-align:center;
margin-bottom:25px;
}

.logo{
width:120px;
margin-bottom:10px;
}

.title{
font-size:26px;
font-weight:bold;
color:#444;
}

.sub{
font-size:14px;
color:#666;
line-height:1.6;
}

.row{
margin-top:15px;
}

label{
font-weight:bold;
display:block;
margin-bottom:5px;
}

input, textarea{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

textarea{
resize:none;
height:70px;
}

.btn{
margin-top:20px;
padding:12px;
background:#2c3e50;
color:white;
border:none;
width:100%;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

.receipt{
margin-top:40px;
border-top:2px solid #ddd;
padding-top:30px;
}

.receipt h2{
text-align:center;
margin-bottom:20px;
}

.line{
margin:8px 0;
}

.signature{
margin-top:50px;
text-align:center;
}

.signature img{
width:180px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<img src="logo.PNG" class="logo">

<div class="title">RECIBOS AMWAY MÉXICO</div>

<div class="sub">
Ignacio Tabardillo<br>
Empresario Independiente Amway<br>
ID: 1701181882
</div>

</div>

<div class="row">
<label>Número de Recibo</label>
<input type="number" id="folio">
</div>

<div class="row">
<label>Fecha</label>
<input type="date" id="fecha">
</div>

<div class="row">
<label>Nombre del cliente</label>
<input type="text" id="cliente">
</div>

<div class="row">
<label>Cantidad ($)</label>
<input type="number" id="cantidad">
</div>

<div class="row">
<label>Cantidad con letra</label>
<input type="text" id="letra">
</div>

<div class="row">
<label>Concepto</label>
<textarea id="concepto"></textarea>
</div>

<button class="btn" onclick="generar()">Generar Recibo</button>

<div class="receipt" id="recibo" style="display:none">

<h2>RECIBO</h2>

<div class="line"><b>No:</b> <span id="rfolio"></span></div>
<div class="line"><b>Fecha:</b> <span id="rfecha"></span></div>
<div class="line"><b>Cliente:</b> <span id="rcliente"></span></div>
<div class="line"><b>Cantidad:</b> $<span id="rcantidad"></span></div>
<div class="line"><b>Importe con letra:</b> <span id="rletra"></span></div>
<div class="line"><b>Concepto:</b> <span id="rconcepto"></span></div>

<div class="signature">

<img src="firma.PNG">

<div>Firma</div>

</div>

</div>

</div>

<script>

function generar(){

document.getElementById("recibo").style.display="block"

document.getElementById("rfolio").innerText=document.getElementById("folio").value
document.getElementById("rfecha").innerText=document.getElementById("fecha").value
document.getElementById("rcliente").innerText=document.getElementById("cliente").value
document.getElementById("rcantidad").innerText=document.getElementById("cantidad").value
document.getElementById("rletra").innerText=document.getElementById("letra").value
document.getElementById("rconcepto").innerText=document.getElementById("concepto").value

}

</script>

</body>
</html>
