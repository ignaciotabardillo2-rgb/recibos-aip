<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recibos Amway</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0a1422;
color:white;
}

.header{
background:linear-gradient(180deg,#3b6aa3,#2c5588);
border-radius:30px;
margin:15px;
padding:30px;
text-align:center;
}

.logo{
width:180px;
display:block;
margin:auto;
}

.subtitulo{
margin-top:10px;
font-size:18px;
opacity:.9;
}

.menu{
margin-top:25px;
display:flex;
justify-content:center;
gap:15px;
}

.menu button{

background:#6f8fb7;
border:none;
color:white;
padding:12px 22px;
border-radius:15px;
font-size:16px;
cursor:pointer;
}

.menu button.active{
background:white;
color:#2c5588;
font-weight:bold;
}

.categorias{

margin:20px;
display:flex;
gap:15px;
overflow:auto;
}

.categorias button{

background:#345f93;
border:none;
padding:10px 18px;
border-radius:10px;
color:white;
}

.busqueda{
background:#08101c;
margin:20px;
padding:20px;
border-radius:20px;
}

input,select{

width:100%;
padding:12px;
margin-top:10px;
background:#020a14;
border:1px solid #3b4f69;
border-radius:12px;
color:white;
}

.catalogo{

background:white;
color:black;
margin:20px;
padding:20px;
border-radius:25px;
}

.productos{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.producto{

border:1px dashed #cfd6dd;
padding:20px;
border-radius:20px;
text-align:center;
}

.producto h3{

margin:10px 0;
}

.producto button{

background:#1e4a7b;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">

<img src="logo.png" class="logo">

<div class="subtitulo">
Empresario Independiente
</div>

<div class="menu">

<button class="active">
Catálogo
</button>

<button>
Recibo
</button>

<button>
Historial
</button>

</div>

</div>


<div class="categorias">

<button>
Todos
</button>

<button>
Nutrilite
</button>

<button>
XS
</button>

<button>
Artistry
</button>

<button>
Satinique
</button>

<button>
G&H
</button>

</div>


<div class="busqueda">

<label>Buscar producto</label>
<input placeholder="Escribe nombre o categoría">

<label>Filtrar categoría</label>
<select>

<option>Todas las categorías</option>

</select>

<label>Ordenar por</label>

<select>

<option>Nombre</option>

</select>

</div>


<div class="catalogo">

<h2>
Catálogo visual
</h2>

<p>
Agrega productos desde las tarjetas para armar la venta.
</p>

<div class="productos">


<div class="producto">

<h3>
Cal Mag D Advanced
</h3>

<p>
Suplemento de calcio y vitamina D
</p>

<button>
Agregar
</button>

</div>


<div class="producto">

<h3>
CLA 500
</h3>

<p>
Apoyo nutricional
</p>

<button>
Agregar
</button>

</div>


<div class="producto">

<h3>
Daily Plus
</h3>

<p>
Multivitamínico
</p>

<button>
Agregar
</button>

</div>


</div>

</div>


</body>
</html>
