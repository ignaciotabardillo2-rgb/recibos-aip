<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asesoría Integral en Pensiones</title>

<style>
body{
  font-family: Arial;
  background:#0b0f14;
  color:white;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
}

input, select{
  width:100%;
  padding:15px;
  margin:10px 0;
  border-radius:15px;
  border:none;
  background:#111827;
  color:white;
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:15px;
  background:#16a34a;
  color:white;
  font-weight:bold;
}

.preview{
  background:white;
  color:black;
  padding:20px;
  margin-top:20px;
  border-radius:20px;
}

.logo{
  text-align:center;
}

.logo img{
  width:100px;
}

.title{
  text-align:center;
  font-weight:bold;
  font-size:24px;
  margin-top:10px;
}

.folio{
  text-align:right;
  color:red;
  font-weight:bold;
}

.row{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  border-bottom:1px solid #ccc;
  padding-bottom:5px;
}

.firma{
  margin-top:40px;
  text-align:center;
}

.firma img{
  width:200px;
  display:block;
  margin:auto;
}

.linea{
  border-top:2px solid black;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<input id="nombre" placeholder="Nombre">
<input id="ciudad" placeholder="Ciudad">
<input id="direccion" placeholder="Dirección">
<input id="celular" placeholder="Celular">

<input id="cantidad" type="number" placeholder="Cantidad">

<select id="metodo">
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<input id="conceptoPago" placeholder="Por concepto de pago">

<input id="letra" placeholder="Importe con letra (auto)">

<button onclick="generar()">Generar recibo</button>

<div id="preview"></div>

</div>

<script>

// convertir número a letras
function numeroALetras(num){
  const unidades = ["","uno","dos","tres","cuatro","cinco","seis","siete","ocho","nueve"];
  const especiales = ["diez","once","doce","trece","catorce","quince"];
  const decenas = ["","","veinte","treinta","cuarenta","cincuenta","sesenta","setenta","ochenta","noventa"];
  const centenas = ["","ciento","doscientos","trescientos","cuatrocientos","quinientos","seiscientos","setecientos","ochocientos","novecientos"];

  if(num==0) return "cero";

  if(num==100) return "cien";

  if(num<10) return unidades[num];

  if(num<16) return especiales[num-10];

  if(num<20) return "dieci"+unidades[num-10];

  if(num<30) return num==20 ? "veinte" : "veinti"+unidades[num-20];

  if(num<100){
    let d=Math.floor(num/10);
    let r=num%10;
    return decenas[d]+(r?" y "+unidades[r]:"");
  }

  if(num<1000){
    let c=Math.floor(num/100);
    let r=num%100;
    return centenas[c]+(r?" "+numeroALetras(r):"");
  }

  if(num<1000000){
    let m=Math.floor(num/1000);
    let r=num%1000;
    return (m==1?"mil":numeroALetras(m)+" mil")+(r?" "+numeroALetras(r):"");
  }

  return num;
}

// automático letras
document.getElementById("cantidad").addEventListener("input", function(){
  let val = parseInt(this.value);
  if(!isNaN(val)){
    document.getElementById("letra").value = (numeroALetras(val)+" pesos").toUpperCase();
  }
});

function generar(){

let nombre = document.getElementById("nombre").value;
let ciudad = document.getElementById("ciudad").value;
let direccion = document.getElementById("direccion").value;
let celular = document.getElementById("celular").value;
let cantidad = document.getElementById("cantidad").value;
let metodo = document.getElementById("metodo").value;
let letra = document.getElementById("letra").value;
let concepto = document.getElementById("conceptoPago").value;

let folio = "AIP-" + Math.floor(Math.random()*10000);

let fecha = new Date().toLocaleString("es-MX");

document.getElementById("preview").innerHTML = `
<div class="preview">

<div class="folio">${folio}</div>

<div class="logo">
<img src="logo.PNG">
</div>

<div class="title">
ASESORÍA INTEGRAL EN PENSIONES
</div>

<div class="row"><span>Recibí de</span><span>${nombre}</span></div>
<div class="row"><span>Ciudad</span><span>${ciudad}</span></div>
<div class="row"><span>Dirección</span><span>${direccion}</span></div>
<div class="row"><span>Celular</span><span>${celular}</span></div>
<div class="row"><span>Cantidad ($)</span><span>$${cantidad}</span></div>
<div class="row"><span>Método de pago</span><span>${metodo}</span></div>
<div class="row"><span>Importe con letra</span><span>${letra}</span></div>
<div class="row"><span>Por concepto de pago</span><span>${concepto}</span></div>
<div class="row"><span>Fecha</span><span>${fecha}</span></div>

<div class="firma">
<img src="firma.png">
<div class="linea"></div>
Firma de recibido
</div>

</div>
`;

}

</script>

</body>
</html>
